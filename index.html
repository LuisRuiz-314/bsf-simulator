<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BSF Simulator - Pro Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #060b06; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        #game-container { width: 100vw; height: 100vh; height: 100svh; display: flex; justify-content: center; align-items: center; }
        #orientation-warning { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #060b06; color: #00ff66; z-index: 9999; text-align: center; justify-content: center; align-items: center; flex-direction: column; font-size: 18px; padding: 20px; box-sizing: border-box; }
        @media (orientation: portrait) { #orientation-warning { display: flex; } }
    </style>
</head>
<body>
    <div id="orientation-warning">
        <h2>🔄 GIRA TU DISPOSITIVO</h2>
        <p>Protocolo Bio-Industrial optimizado para formato horizontal.</p>
    </div>
    <div id="game-container"></div>

<script>
let nivelActual = 1;
let puntuacionAcumulada = 0;

class MenuScene extends Phaser.Scene {
    constructor() { super({ key: 'MenuScene' }); }
    create() {
        let grid = this.add.graphics();
        grid.lineStyle(1, 0x112511, 1);
        for (let x = 0; x < 1100; x += 40) grid.lineBetween(x, 0, x, 600);
        for (let y = 0; y < 600; y += 40) grid.lineBetween(0, y, 1100, y);
        this.add.text(550, 220, "BSF SIMULATOR", { fontSize: '52px', fontFamily: 'monospace', fill: '#00ff66', fontWeight: 'bold' }).setOrigin(0.5).setStroke('#003311', 8);
        this.add.text(550, 280, "// BIOMASS INDUSTRIAL CORE //", { fontSize: '15px', fontFamily: 'monospace', fill: '#00d2ff' }).setOrigin(0.5);
        let btn = this.add.rectangle(550, 420, 320, 60, 0x142214).setInteractive().setStrokeStyle(2, 0x00ff66, 0.8);
        let txt = this.add.text(550, 420, "[ INICIAR PROTOCOLO ]", { fontSize: '15px', fontFamily: 'monospace', fill: '#00ff66' }).setOrigin(0.5);
        btn.on('pointerdown', () => { this.cameras.main.flash(300, 0, 255, 102); this.time.delayedCall(200, () => this.scene.start('GameScene')); });
    }
}

class GameScene extends Phaser.Scene {
    constructor() { super({ key: 'GameScene' }); }

    create() {
        this.tiempoRestante = 180;
        this.juegoTerminado = false;
        this.listaBandejas = [];
        this.bandejaSeleccionada = null;
        this.valorAlimentoCargado = 0; 
        this.nombreAlimentoCargado = "VACÍO";

        // Fondo y Texturas
        let grid = this.add.graphics();
        grid.lineStyle(1, 0x112511, 1);
        for (let x = 0; x < 900; x += 40) grid.lineBetween(x, 0, x, 600);
        for (let y = 0; y < 600; y += 40) grid.lineBetween(0, y, 900, y);

        if (!this.textures.exists('granjeroTex')) {
            let g = this.make.graphics({ x: 0, y: 0, add: false });
            g.fillStyle(0x1a252c).fillCircle(20, 20, 18).lineStyle(3, 0x00d2ff).strokeCircle(20, 20, 16).fillStyle(0xffffff).fillRect(28, 16, 8, 8);
            g.generateTexture('granjeroTex', 40, 40);
        }
        if (!this.textures.exists('bandejaTex')) {
            let g = this.make.graphics({ x: 0, y: 0, add: false });
            g.fillStyle(0x111611).fillRoundedRect(4, 4, 142, 82, 8).lineStyle(2, 0x223322).strokeRoundedRect(4, 4, 142, 82, 8);
            g.generateTexture('bandejaTex', 150, 90);
        }

        this.granjero = this.physics.add.image(450, 300, 'granjeroTex').setDepth(10);
        this.destino = new Phaser.Math.Vector2(450, 300);
        this.barraProgresoDias = this.add.graphics().setDepth(15);

        // UI Panel Derecho
        this.add.graphics().fillStyle(0x091109, 0.95).fillRect(900, 0, 200, 600).lineStyle(2, 0x1f3d1f).lineBetween(900, 0, 900, 600);
        
        this.iniciarNivel();

        // Movimiento
        this.input.on('pointerdown', (pointer, gameObjects) => {
            if (this.juegoTerminado) return;
            if (gameObjects.length > 0 && gameObjects[0].texture && gameObjects[0].texture.key === 'bandejaTex') {
                this.destino.setTo(gameObjects[0].x, gameObjects[0].y);
                this.physics.moveToObject(this.granjero, this.destino, 350);
                this.granjero.setRotation(Phaser.Math.Angle.Between(this.granjero.x, this.granjero.y, this.destino.x, this.destino.y));
                return;
            }
            if (pointer.x < 900) {
                this.destino.setTo(pointer.x, pointer.y);
                this.physics.moveToObject(this.granjero, this.destino, 350);
                this.granjero.setRotation(Phaser.Math.Angle.Between(this.granjero.x, this.granjero.y, this.destino.x, this.destino.y));
            }
        });

        // Panel Alimentos
        const alims = [
            { label: "⚡ HUM +5.0%", val: 5, col: 0x00ff66 },
            { label: "🟢 HUM +2.5%", val: 2.5, col: 0x00aa44 },
            { label: "🔹 HUM +1.0%", val: 1, col: 0x0088cc },
            { label: "🔸 SEC -1.0%", val: -1, col: 0xffaa00 },
            { label: "🔴 SEC -2.5%", val: -2.5, col: 0xcc3300 },
            { label: "🔥 SEC -5.0%", val: -5, col: 0xff3333 }
        ];
        alims.forEach((a, i) => {
            let btn = this.add.rectangle(1000, 80 + (i * 65), 175, 45, 0x142214).setInteractive().setStrokeStyle(1, a.col, 0.5);
            this.add.text(920, 72 + (i * 65), a.label, { fontSize: '11px', fontFamily: 'monospace', fill: '#fff' });
            btn.on('pointerdown', () => { this.valorAlimentoCargado = a.val; this.nombreAlimentoCargado = a.label.substring(2); this.cameras.main.shake(50, 0.001); });
        });

        // BOTÓN MEZCLAR BANDEJA
        let btnMezclar = this.add.rectangle(1000, 520, 175, 55, 0x00ff66).setInteractive();
        this.add.text(925, 512, "MEZCLAR BANDEJA", { fontSize: '13px', fontFamily: 'monospace', fill: '#000', fontWeight: 'bold' });
        btnMezclar.on('pointerdown', () => {
            if (this.bandejaSeleccionada) this.procesarMezcla(this.bandejaSeleccionada);
            else this.cameras.main.flash(200, 100, 0, 0);
        });

        this.textoScore = this.add.text(25, 20, '', { fontSize: '16px', fontFamily: 'monospace', fill: '#00ff66', fontWeight: 'bold' });
        this.textoHUD = this.add.text(25, 45, '', { fontSize: '11px', fontFamily: 'monospace', fill: '#a0bfa0' });
        this.textoDias = this.add.text(770, 23, '', { fontSize: '12px', fontFamily: 'monospace', fill: '#00d2ff' });

        this.time.addEvent({ delay: 1000, callback: this.updateClock, loop: true, callbackScope: this });
    }

    iniciarNivel() {
        this.listaBandejas = [];
        this.bandejaSeleccionada = null;
        let num = 3 + ((nivelActual - 1) * 2);
        if (num > 6) num = 6;
        for (let i = 0; i < num; i++) {
            let x = 180 + ((i % 3) * 280);
            let y = 180 + (Math.floor(i / 3) * 200);
            let sprite = this.add.image(x, y, 'bandejaTex').setInteractive();
            let b = {
                sprite: sprite, id: i + 1, humedad: 70, larvas: 1000, maduracion: 0, completada: false, muertas: 0, barra: this.add.graphics(),
                txtInfo: this.add.text(x - 60, y - 35, '', { fontSize: '11px', fontFamily: 'monospace', fill: '#80ff80', lineSpacing: 3 }).setDepth(5)
            };
            sprite.on('pointerdown', () => this.bandejaSeleccionada = b);
            this.listaBandejas.push(b);
        }
    }

    procesarMezcla(b) {
        if (this.juegoTerminado || b.completada) return;
        if (Phaser.Math.Distance.Between(this.granjero.x, this.granjero.y, b.sprite.x, b.sprite.y) < 110) {
            if (this.valorAlimentoCargado !== 0) {
                b.humedad = Phaser.Math.Clamp(b.humedad + this.valorAlimentoCargado, 0, 100);
                b.sprite.setTint(0x00ff66);
                this.time.delayedCall(150, () => b.sprite.clearTint());
            }
        } else {
            this.granjero.setTint(0xff3333);
            this.time.delayedCall(200, () => this.granjero.clearTint());
        }
    }

    updateClock() {
        if (this.juegoTerminado) return;
        this.tiempoRestante--;
        this.listaBandejas.forEach(b => {
            if (b.completada) return;
            b.humedad -= 0.8;
            if (b.humedad >= 61 && b.humedad <= 80) b.maduracion += 1.0;
            else if (b.humedad < 61) { b.maduracion += 0.5; b.larvas -= 2; b.muertas += 2; }
            if (b.maduracion >= 100) { b.maduracion = 100; b.completada = true; }
        });

        // VERIFICACIÓN DE VICTORIA TEMPRANA
        if (this.listaBandejas.every(b => b.completada)) {
            this.finalizarNivel(true); // Enviar 'true' para indicar victoria temprana
        } else if (this.tiempoRestante <= 0) {
            this.finalizarNivel(false);
        }
    }

    update() {
        if (this.juegoTerminado) return;
        if (this.granjero.body.speed > 0 && Phaser.Math.Distance.Between(this.granjero.x, this.granjero.y, this.destino.x, this.destino.y) < 10) this.granjero.body.reset(this.destino.x, this.destino.y);

        this.textoScore.setText(`PROTOCOLO NIVEL 0${nivelActual}`);
        this.textoHUD.setText(`Carga: [ ${this.nombreAlimentoCargado} ]\nLote : [ ${this.bandejaSeleccionada ? '0'+this.bandejaSeleccionada.id : '---'} ]\nPuntos: [ ${puntuacionAcumulada} ]`);

        this.barraProgresoDias.clear().fillStyle(0x111c11).fillRect(490, 24, 260, 14).lineStyle(1, 0x00d2ff, 0.5).strokeRect(490, 24, 260, 14);
        this.barraProgresoDias.fillStyle(0x00d2ff).fillRect(492, 26, 256 * ((180 - this.tiempoRestante) / 180), 10);
        let diaAct = Math.floor(((180 - this.tiempoRestante) / 180) * 30) + 1;
        this.textoDias.setText(`DÍA ${diaAct > 30 ? 30 : diaAct.toString().padStart(2, '0')}/30`);

        this.listaBandejas.forEach(b => {
            b.barra.clear().fillStyle(0x000).fillRect(b.sprite.x - 55, b.sprite.y + 18, 110, 8);
            b.barra.lineStyle(1, 0xffffff, 0.2).strokeRect(b.sprite.x - 55 + 61, b.sprite.y + 16, 19, 12);
            let col = b.humedad < 61 ? 0xff3333 : (b.humedad > 80 ? 0xffcc00 : 0x00ff66);
            b.barra.fillStyle(col).fillRect(b.sprite.x - 55, b.sprite.y + 18, b.humedad * 1.1, 8);
            if (this.bandejaSeleccionada && this.bandejaSeleccionada.id === b.id) b.barra.lineStyle(2, 0x00d2ff).strokeRoundedRect(b.sprite.x - 75, b.sprite.y - 45, 150, 90, 8);

            if (b.completada) {
                b.txtInfo.setText(`LOTE #0${b.id} READY\nPOB: ${b.larvas.toFixed(0)}`).setColor('#00ff66');
            } else {
                b.txtInfo.setText(`LOTE #0${b.id}\nHUM: ${b.humedad.toFixed(1)}%\nMAD: ${b.maduracion.toFixed(1)}%`).setColor(col === 0xff3333 ? '#ff8888' : '#fff');
            }
        });
    }

    finalizarNivel(victoriaTemprana) {
        this.juegoTerminado = true;
        let ptsNivel = 0;
        let bonus = 0;

        this.listaBandejas.forEach(b => {
            if (b.completada) ptsNivel += (b.larvas * 10);
            ptsNivel -= (b.muertas * 5);    
        });

        if (victoriaTemprana) {
            let diaActual = Math.floor(((180 - this.tiempoRestante) / 180) * 30) + 1;
            let diasRestantes = 30 - diaActual;
            if (diasRestantes > 0) {
                bonus = diasRestantes * 100;
                ptsNivel += bonus;
            }
        }
        
        puntuacionAcumulada += ptsNivel;

        let msg = `// REPORTE LOTE 0${nivelActual} //\n\n`;
        msg += victoriaTemprana ? `¡COSECHA ANTICIPADA!\nBono Tiempo: +${bonus} PTS\n` : `TIEMPO AGOTADO.\n`;
        msg += `Total Ronda: ${ptsNivel} PTS.`;

        if (nivelActual < 5) {
            alert(msg); nivelActual++; this.scene.restart();
        } else {
            alert(`// SIMULACIÓN FINALIZADA //\n\nPUNTAJE FINAL: ${puntuacionAcumulada}`);
            nivelActual = 1; puntuacionAcumulada = 0; this.scene.start('MenuScene');
        }
    }
}

const config = {
    type: Phaser.AUTO, width: 1100, height: 600, parent: 'game-container',
    physics: { default: 'arcade', arcade: { debug: false } },
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
    scene: [MenuScene, GameScene] 
};
const game = new Phaser.Game(config);
</script>
</body>
</html>
